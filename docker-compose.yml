services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    restart: unless-stopped
    profiles:
      - prod

  sandbox:
    build: ./sandbox
    ports:
      - "5173:5173"
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - prod

  dev:
    build:
      context: .
      target: builder
    volumes:
      - ./src:/app/src
    ports:
      - "3000:3000"
    env_file: .env
    command: npx tsx watch src/index.ts

  sandbox-dev:
    build:
      context: ./sandbox
      target: builder
    volumes:
      - ./sandbox/src:/app/src
      - ./sandbox/index.html:/app/index.html
      - ./sandbox/vite.config.ts:/app/vite.config.ts
    environment:
      - API_URL=http://dev:3000
    ports:
      - "5173:5173"
    depends_on:
      - dev
    command: npx vite --host 0.0.0.0
